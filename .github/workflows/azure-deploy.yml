name: Deploy to Azure App Service

# Builds the React frontend (dist/) and packages it together with the Flask
# backend, then deploys to the Azure App Service (Linux, Oryx/Python). Oryx
# installs Python deps from requirements.txt server-side; startup.sh runs
# database migrations and launches gunicorn (wsgi:app).
#
# Requires a repository secret AZURE_WEBAPP_PUBLISH_PROFILE:
#   App Service -> Overview -> Download publish profile -> paste file contents
#   into GitHub -> Settings -> Secrets and variables -> Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Assemble deployment package
        run: |
          mkdir -p package
          rsync -a \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='instance' \
            --exclude='var' \
            --exclude='.pytest_cache' \
            --exclude='.env' \
            --exclude='.env.*' \
            backend/ package/backend/
          cp -r dist package/dist
          cp startup.sh package/startup.sh
          cp requirements.txt package/requirements.txt

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: SemanticGuardAi
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: package
